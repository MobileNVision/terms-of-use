<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hangi - Yasal Belgeler</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; 
        line-height: 1.6; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 40px;
      }
      h1 {
        font-size: 32px;
        color: #111;
        margin-bottom: 12px;
      }
      .subtitle {
        color: #666;
        font-size: 16px;
        margin-bottom: 32px;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      a {
        display: block;
        padding: 16px 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 500;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
      }
      .footer {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid #eee;
        text-align: center;
        color: #999;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🛡️ Hangi</h1>
      <p class="subtitle">Yasal Belgeler ve Politikalar</p>
      
      <div class="links">
        <a href="./terms-of-use.html">📋 Kullanım Şartları (EULA)</a>
        <!-- Diğer yasal belgeler için yer -->
      </div>

      <div class="footer">
        <p>Hangi © 2026 - Tüm Hakları Saklıdır</p>
        <p style="margin-top: 8px;">İletişim: <a href="mailto:terms@hangi.app" style="color: #0b74de; padding: 0; background: none; box-shadow: none;">terms@hangi.app</a></p>
      </div>
    </div>
  </body>
</html>
